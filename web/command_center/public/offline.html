<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1117" />
    <title>THIRAMAI - Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f1117;
        color: #e5e7eb;
      }
      .card {
        width: min(92vw, 460px);
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 24px;
        background: #111827;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }
      p {
        margin: 0;
        color: #9ca3af;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>THIRAMAI is running in offline mode. Reconnect to sync live data and actions.</p>
    </main>
  </body>
</html>
