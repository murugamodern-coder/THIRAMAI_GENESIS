[pytest]
pythonpath = .
testpaths = tests
# importlib avoids namespace collisions; capture=no avoids Py3.14/Windows teardown issues in some CI hosts.
# Coverage is opt-in via CLI (e.g. CI): pytest --cov=core --cov=services --cov=api --cov=workers ...
# When using pytest-cov, [.coveragerc] supplies reports (term/html/xml/json) and branch coverage.
addopts = --import-mode=importlib --capture=no --durations=10
filterwarnings =
    ignore::DeprecationWarning
