# JSON-file Docker logs — prevents unbounded growth on long-running hosts.
# Install: sudo cp deploy/logrotate/docker-containers-json.conf /etc/logrotate.d/docker-thiramai
#
# Note: Docker “json-file” driver already supports max-size/max-file in compose files
# (see docker-compose.production.yml). Prefer that for per-container caps; use logrotate
# only if you aggregate logs to files under /var/log/docker/.

/var/log/docker/thiramai/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
