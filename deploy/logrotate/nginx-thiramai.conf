# Install: sudo cp deploy/logrotate/nginx-thiramai.conf /etc/logrotate.d/nginx-thiramai
/var/log/nginx/thiramai-app*.log {
    weekly
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 "$(cat /var/run/nginx.pid)"
    endscript
}
