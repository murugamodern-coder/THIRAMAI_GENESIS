# Install into /etc/nginx/conf.d/ (loaded inside http { } — BEFORE site configs on Debian/Ubuntu).
#
# Provides:
#   - limit_req_zone for /ai autonomous surface
#   - log_format thiramai_combined (real client + X-Forwarded-For chain)
#
# After installing:
#   sudo nginx -t && sudo systemctl reload nginx

# Per-IP bucket for /ai (HTTP + WebSocket upgrade on same prefix). Tune rate for your traffic.
# Example: 30 requests/sec per IP, burst allows polling /ai/status + submits without 429 spam.
limit_req_zone $binary_remote_addr zone=thiramai_ai:16m rate=30r/s;

# Combined access log: effective remote (after real_ip, if configured) + original forwarded chain.
log_format thiramai_combined '$remote_addr $http_x_forwarded_for [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time urt="$upstream_response_time"';

# Optional: return 429 with a stable body for API clients (default is HTML error page).
limit_req_status 429;
