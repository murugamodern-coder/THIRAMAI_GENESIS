# Content-Security-Policy for THIRAMAI SPA (same-origin API + WebSockets).
#
# Adjust if you add: third-party analytics, Stripe, maps, OAuth token endpoints
# reachable via fetch/XHR, iframe login widgets, or CDN-hosted scripts.
#
# Rollout tip: temporarily send Content-Security-Policy-Report-Only with the same
# policy plus report-uri/report-to; fix violations before enforcing.

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-src 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content" always;
