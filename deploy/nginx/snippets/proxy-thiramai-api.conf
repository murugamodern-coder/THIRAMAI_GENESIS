# Shared reverse-proxy settings for the THIRAMAI FastAPI upstream.
# Include from each location block that forwards to the API container / process.

proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Long reads for autonomy / streaming / slow LLM paths
proxy_connect_timeout 75s;
proxy_send_timeout 3600s;
proxy_read_timeout 3600s;

# Buffering — adjust if you terminate huge uploads at Nginx first
proxy_buffering on;
proxy_buffer_size 16k;
proxy_buffers 8 16k;
