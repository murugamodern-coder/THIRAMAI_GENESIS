# THIRAMAI — Nginx edge for https://app.thiramai.co.in
#
# Prerequisites:
#   1) Install deploy/nginx/conf.d/10-thiramai-production.conf → /etc/nginx/conf.d/
#   2) Build the React app (client/) and sync build output under root (below).
#   3) API on 127.0.0.1:8000 (Docker compose web or systemd).
#   4) WebSocket map in nginx.conf http{} — deploy/nginx/nginx-http-map-websocket.conf
#   5) TLS — deploy/certbot/README.md
#
# Install (Debian/Ubuntu style):
#   sudo cp deploy/nginx/conf.d/10-thiramai-production.conf /etc/nginx/conf.d/
#   sudo cp deploy/nginx/snippets/proxy-thiramai-api.conf /etc/nginx/snippets/
#   sudo ln -sf /etc/nginx/sites-available/app.thiramai.co.in.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream thiramai_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# HTTP → HTTPS redirect
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.thiramai.co.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — static SPA + API proxy (same origin for REACT_APP_API_URL="")
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.thiramai.co.in;

    # If this Nginx is behind another LB/CDN, install snippets/thiramai-real-ip-from-upstream.conf.example
    # as snippets/thiramai-real-ip-from-upstream.conf and uncomment include:
    # include snippets/thiramai-real-ip-from-upstream.conf;

    # ---- TLS (paths after certbot) ----
    ssl_certificate     /etc/letsencrypt/live/app.thiramai.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.thiramai.co.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Optional OCSP stapling (requires valid resolver + reachable CA OCSP)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ---- Logs: format includes $remote_addr (effective client) + $http_x_forwarded_for (chain) ----
    access_log /var/log/nginx/thiramai-app.access.log thiramai_combined;
    error_log  /var/log/nginx/thiramai-app.error.log warn;

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # ---- Security headers (browser-facing responses) ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # SPA + API same origin — see deploy/nginx/snippets/csp-thiramai.conf
    include snippets/csp-thiramai.conf;

    root /var/www/thiramai/client/build;

    # Prometheus / docs — restrict non-local access in production
    location ^~ /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    # ---- /ai: autonomy API + WebSocket upgrade for /ai/logs/ws (see deploy/nginx/WEBSOCKET-CHECKLIST.md) ----
    location ^~ /ai {
        limit_req zone=thiramai_ai burst=80 nodelay;
        include snippets/proxy-thiramai-api.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://thiramai_api;
    }

    location ^~ /v1/ {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location ^~ /api {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location ^~ /auth {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location ^~ /health {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location ^~ /docs {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location ^~ /redoc {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location = /openapi.json {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location ^~ /static/command_center/ {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    location ~ ^/(command-center|dashboard)(/.*)?$ {
        include snippets/proxy-thiramai-api.conf;
        proxy_pass http://thiramai_api;
    }

    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        # Nginx: any add_header here replaces inherited server-level headers for this
        # location — repeat CSP so SPA try_files fallbacks keep the policy.
        include snippets/csp-thiramai.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location ~* \.(?:js|css|map|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /static/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
