# THIRAMAI Genesis — tests, frontend build, Docker image (Phase 7)
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      ENV: development
      THIRAMAI_ENV: development
      THIRAMAI_SAFE_ERRORS: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/command_center/package-lock.json

      - name: Build Command Center (Vite)
        working-directory: web/command_center
        run: npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: thiramai-genesis:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
