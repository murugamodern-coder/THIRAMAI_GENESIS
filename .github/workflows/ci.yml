# THIRAMAI Genesis — tests, frontend build, Docker image (Phase 7)
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      ENV: development
      THIRAMAI_ENV: development
      THIRAMAI_SAFE_ERRORS: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-base.txt
            requirements-production.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: SAST scan (Bandit)
        run: |
          pip install bandit
          bandit -r app/ core/ api/ workers/ -ll -ii \
            --exclude tests/ \
            -f json -o reports/bandit.json || true
          python scripts/gate_bandit.py reports/bandit.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/command_center/package-lock.json

      - name: Build Command Center (Vite)
        working-directory: web/command_center
        env:
          CC_GIT_SHA: ${{ github.sha }}
          CC_BUILD_VERSION: ${{ github.run_number }}
        run: rm -rf ../../static/command_center/* && npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            thiramai-genesis:ci
            thiramai-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: thiramai-app:latest
          format: sarif
          output: reports/trivy.sarif
          severity: CRITICAL,HIGH

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/django
            p/jwt
            p/secrets

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/
