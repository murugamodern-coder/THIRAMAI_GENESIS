name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip pytest gate (emergency only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Test (gate)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-base.txt
            requirements-production.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short --import-mode=importlib

  deploy:
    name: Immutable deploy
    runs-on: ubuntu-latest
    needs: [verify]
    if: always() && (needs.verify.result == 'success' || needs.verify.result == 'skipped')
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive immutable image tag
        id: tag
        run: |
          set -euo pipefail
          IMAGE_TAG="$(git rev-parse --short HEAD)"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "${IMAGE_TAG}" > .current_deploy_tag
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure image name
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.CONTAINER_REGISTRY }}"
          if [ -z "${REGISTRY}" ]; then
            REGISTRY="ghcr.io"
          fi
          REPO="${{ vars.CONTAINER_IMAGE_REPO }}"
          if [ -z "${REPO}" ]; then
            REPO="${{ github.repository_owner }}/thiramai-app"
          fi
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"
          echo "REGISTRY_IMAGE=${REGISTRY}/${REPO}" >> "$GITHUB_ENV"

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image tags
        run: |
          set -euo pipefail
          docker build -t thiramai-app:${IMAGE_TAG} .
          docker tag thiramai-app:${IMAGE_TAG} thiramai-app:latest
          docker tag thiramai-app:${IMAGE_TAG} ${REGISTRY_IMAGE}:${IMAGE_TAG}
          docker tag thiramai-app:${IMAGE_TAG} ${REGISTRY_IMAGE}:latest
          docker push ${REGISTRY_IMAGE}:${IMAGE_TAG}
          docker push ${REGISTRY_IMAGE}:latest

      - name: Upload deploy tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-deploy-tag
          path: .current_deploy_tag

      - name: Require production SSH secrets
        env:
          KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER_NAME: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$KEY" || { echo "::error::Missing PRODUCTION_SSH_KEY — see .github/DEPLOY_SETUP.md"; exit 1; }
          test -n "$HOST" || { echo "::error::Missing PRODUCTION_HOST"; exit 1; }
          test -n "$USER_NAME" || { echo "::error::Missing PRODUCTION_USER"; exit 1; }
          test -n "$DEPLOY_PATH" || { echo "::error::Missing PRODUCTION_DEPLOY_PATH"; exit 1; }
          echo "Production secrets present (values not shown)."

      - name: Resolve SSH port
        id: sshport
        env:
          P: ${{ secrets.PRODUCTION_SSH_PORT }}
        run: |
          if [ -z "${P:-}" ]; then echo "port=22" >> "$GITHUB_OUTPUT"; else echo "port=${P}" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GHCR_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ steps.sshport.outputs.port }}
          fingerprint: ${{ secrets.PRODUCTION_SSH_FINGERPRINT }}
          command_timeout: 45m
          envs: DEPLOY_PATH,REGISTRY_IMAGE,IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,REGISTRY
          script: |
            set -euo pipefail
            set -x
            export DEPLOY_PATH="${DEPLOY_PATH:?}"
            cd "${DEPLOY_PATH}"
            test -f ".env.production" || { echo "::error::Missing .env.production"; exit 1; }

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "${GHCR_TOKEN}" | docker login "${REGISTRY}" -u "${GHCR_USERNAME}" --password-stdin
            fi

            docker pull "${REGISTRY_IMAGE}:${IMAGE_TAG}"
            docker tag "${REGISTRY_IMAGE}:${IMAGE_TAG}" "thiramai-app:${IMAGE_TAG}"
            docker tag "${REGISTRY_IMAGE}:${IMAGE_TAG}" "thiramai-app:latest"

            if ! bash scripts/pre_deploy_check.sh; then
              echo "::error::pre_deploy_check failed"
              bash scripts/rollback.sh || true
              exit 1
            fi

            if ! bash scripts/deploy_production.sh "${IMAGE_TAG}"; then
              echo "::error::deploy_production failed, running rollback"
              bash scripts/rollback.sh || true
              exit 1
            fi
