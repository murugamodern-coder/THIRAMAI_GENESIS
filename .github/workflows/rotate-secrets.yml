name: Monthly secret rotation (dry-run by default)

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      live_rotation:
        description: "If true, perform real rotation (requires AWS creds + SECRETS_BACKEND=aws). Otherwise dry-run."
        required: false
        default: false
        type: boolean

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pydantic pydantic-settings

      - name: Rotate secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1
          SECRETS_BACKEND: aws
        run: |
          set -e
          LIVE='${{ github.event_name == 'workflow_dispatch' && inputs.live_rotation }}'
          if [ "$LIVE" = "true" ]; then
            echo "LIVE rotation enabled"
            python scripts/rotate_secrets.py --all
          else
            echo "Dry-run only (scheduled runs and default manual runs use dry-run)"
            python scripts/rotate_secrets.py --all --dry-run
          fi

      - name: Job summary on failure
        if: failure()
        run: |
          echo "::warning::Secret rotation job failed — check logs and credentials."
