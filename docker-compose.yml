# THIRAMAI ecosystem: API + PostgreSQL + Redis + background worker
#
# Phase 5: for a minimal production stack (web + Postgres only), see docker-compose.prod-slim.yml
# and docs/DEPLOYMENT.md.
#
# Local / full stack:
#   cp .env.example .env   # set secrets, GROQ_API_KEY, TAVILY_API_KEY, SECRET_KEY
#   docker compose up -d --build
#
# Apply DB DDL on first boot (from host or a jump box):
#   docker compose exec db psql -U thiramai -d thiramai -f /path/to/schema  # or run scripts against DATABASE_URL
#
# Web uses THIRAMAI_ENABLE_ALERT_SCHEDULER=0 so the dedicated worker runs APScheduler + alert scans.
# THIRAMAI_JOB_QUEUE=db: HITL/invoice jobs go to PostgreSQL `background_jobs`; **worker-jobs** drains them.
# REDIS_URL: reserved for rate limits / future queue backends; set on all app-facing services.
#
# Production (loopback bind, Gunicorn defaults): see **docker-compose.production.yml** + docs/PRODUCTION_NGINX_SSL.md.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thiramai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thiramai_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-thiramai}
    volumes:
      - thiramai_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thiramai} -d ${POSTGRES_DB:-thiramai}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - thiramai_redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      ENV: ${ENV:-development}
      THIRAMAI_ENV: ${THIRAMAI_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://thiramai:thiramai_change_me@db:5432/thiramai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars-long}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      THIRAMAI_CORS_ORIGINS: ${THIRAMAI_CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      THIRAMAI_ENABLE_ALERT_SCHEDULER: "0"
      THIRAMAI_SAFE_ERRORS: ${THIRAMAI_SAFE_ERRORS:-0}
      THIRAMAI_LOG_JSON: ${THIRAMAI_LOG_JSON:-0}
      THIRAMAI_JOB_QUEUE: db
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-jobs:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "workers.run_worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://thiramai:thiramai_change_me@db:5432/thiramai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      THIRAMAI_JOB_QUEUE: db
      THIRAMAI_WORKER_POLL_SEC: ${THIRAMAI_WORKER_POLL_SEC:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "workers.alert_system"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://thiramai:thiramai_change_me@db:5432/thiramai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      THIRAMAI_ENABLE_ALERT_SCHEDULER: "1"
      THIRAMAI_ALERT_INTERVAL_MINUTES: ${THIRAMAI_ALERT_INTERVAL_MINUTES:-15}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  thiramai_pgdata:
  thiramai_redis:
