groups:
  - name: thiramai_slo
    rules:
      - alert: AvailabilitySLOBreach
        expr: rate(thiramai_requests_total{status=~"5.."}[5m]) > 0.005
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API availability SLO breached"
          description: "5xx error rate exceeded 0.5% over 5 minutes."

      - alert: LatencySLOBreach
        expr: histogram_quantile(0.95, sum by (le) (rate(thiramai_request_duration_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API latency SLO breached - p95 > 500ms"
          description: "The API p95 latency has remained above 500ms for 5 minutes."

      - alert: ErrorBudgetBurnHigh
        expr: rate(thiramai_requests_total{status=~"5.."}[1h]) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Error budget burning fast - check immediately"
          description: "Current 1h 5xx rate indicates elevated burn rate against monthly budget."
