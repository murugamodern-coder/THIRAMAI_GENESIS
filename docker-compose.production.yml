# THIRAMAI Genesis — production SaaS stack
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thiramai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-thiramai}
    volumes:
      - thiramai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thiramai} -d ${POSTGRES_DB:-thiramai}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - thiramai_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API image must be built from this repository; `image` tags the result. Without `build`, `docker compose
  # build web` does not refresh code (stale /ai/* routes on old thiramai-app images).
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_FRONTEND: ${SKIP_FRONTEND:-0}
        THIRAMAI_COMMAND_CENTER_BUILD_ID: ${THIRAMAI_COMMAND_CENTER_BUILD_ID:-}
    image: thiramai-app:${DEPLOY_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 90s
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ENV: production
      THIRAMAI_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      THIRAMAI_CORS_ORIGINS: ${THIRAMAI_CORS_ORIGINS:?set THIRAMAI_CORS_ORIGINS}
      THIRAMAI_SAFE_ERRORS: ${THIRAMAI_SAFE_ERRORS:-1}
      THIRAMAI_LOG_JSON: ${THIRAMAI_LOG_JSON:-1}
      THIRAMAI_ENFORCE_SECURE_COOKIES: "1"
      THIRAMAI_DISABLE_AUTO_SCHEMA_CREATE: "1"
      THIRAMAI_DISABLE_CREATE_ALL: "1"
      EXPECTED_ALEMBIC_REVISION: 0071_security_audit_logs
      THIRAMAI_RL_TRUST_X_FORWARDED_FOR: ${THIRAMAI_RL_TRUST_X_FORWARDED_FOR:-1}
      THIRAMAI_TRUSTED_PROXY_IPS: ${THIRAMAI_TRUSTED_PROXY_IPS:-}
      THIRAMAI_PROXY_TRUSTED_HOSTS: ${THIRAMAI_PROXY_TRUSTED_HOSTS:-*}
      THIRAMAI_JOB_QUEUE: db
      THIRAMAI_ENABLE_ALERT_SCHEDULER: "0"
      THIRAMAI_AUTH_DISABLED: ${THIRAMAI_AUTH_DISABLED:-0}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      THIRAMAI_COMMAND_CENTER_BUILD_ID: ${THIRAMAI_COMMAND_CENTER_BUILD_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  worker-jobs:
    build:
      context: .
      args:
        THIRAMAI_COMMAND_CENTER_BUILD_ID: ${THIRAMAI_COMMAND_CENTER_BUILD_ID:-}
    restart: unless-stopped
    stop_grace_period: 60s
    command: ["python", "-m", "workers.run_worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      THIRAMAI_JOB_QUEUE: db
      THIRAMAI_WORKER_POLL_SEC: ${THIRAMAI_WORKER_POLL_SEC:-2}
      THIRAMAI_RLS_BYPASS: "1"
      THIRAMAI_COMMAND_CENTER_BUILD_ID: ${THIRAMAI_COMMAND_CENTER_BUILD_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f workers.run_worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  worker-alerts:
    build:
      context: .
      args:
        THIRAMAI_COMMAND_CENTER_BUILD_ID: ${THIRAMAI_COMMAND_CENTER_BUILD_ID:-}
    restart: unless-stopped
    stop_grace_period: 60s
    command: ["python", "-m", "workers.alert_system"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      THIRAMAI_ENABLE_ALERT_SCHEDULER: "1"
      THIRAMAI_ALERT_INTERVAL_MINUTES: ${THIRAMAI_ALERT_INTERVAL_MINUTES:-15}
      THIRAMAI_ALERT_LOW_STOCK_THRESHOLD: ${THIRAMAI_ALERT_LOW_STOCK_THRESHOLD:-10}
      THIRAMAI_RLS_BYPASS: "1"
      THIRAMAI_COMMAND_CENTER_BUILD_ID: ${THIRAMAI_COMMAND_CENTER_BUILD_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f workers.alert_system || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  thiramai_pgdata:
  thiramai_redis:
